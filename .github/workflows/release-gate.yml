name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_extended:
        description: Run the extended release gate (requires DATABASE_URL and ADMIN_API_TOKEN secrets)
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: "22"
  NPM_VERSION: "10.9.0"
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.7"

jobs:
  release-gate:
    name: Default gate (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out clean repository
        uses: actions/checkout@v7.0.0
        with:
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pinned npm and uv
        run: |
          npm install --global npm@${{ env.NPM_VERSION }}
          python -m pip install uv==${{ env.UV_VERSION }}

      - name: Show toolchain versions
        run: |
          node --version
          npm --version
          python --version
          uv --version

      - name: Install workspace dependencies from lockfile
        run: npm ci

      - name: Install browser matrix and Linux runtime dependencies
        if: runner.os == 'Linux'
        working-directory: apps/web
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install browser matrix on Windows
        if: runner.os == 'Windows'
        working-directory: apps/web
        run: npx playwright install chromium firefox webkit

      - name: Run default release gate
        env:
          PLAYWRIGHT_BROWSER_MATRIX: "1"
          RELEASE_GATE_USE_SYSTEM_EDGE: "0"
        run: npm run release:default

      - name: Verify gate did not modify tracked files
        run: git diff --exit-code

      - name: Upload release report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-gate-${{ matrix.platform }}
          path: .release-gate/
          if-no-files-found: error
          include-hidden-files: true

  release-gate-extended:
    name: Extended gate (linux)
    if: github.event_name == 'workflow_dispatch' && inputs.run_extended
    needs: release-gate
    runs-on: ubuntu-latest
    env:
      RUN_REAL_DB_TESTS: "1"
      RUN_ADMIN_IMPORT_SMOKE: "1"
      RUN_POSTGRES_ATTACHMENT_RECOVERY: "1"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
    steps:
      - name: Check out clean repository
        uses: actions/checkout@v7.0.0
        with:
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pinned npm and uv
        run: |
          npm install --global npm@${{ env.NPM_VERSION }}
          python -m pip install uv==${{ env.UV_VERSION }}

      - name: Install workspace dependencies from lockfile
        run: npm ci

      - name: Install browser matrix and Linux runtime dependencies
        working-directory: apps/web
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run extended release gate
        env:
          PLAYWRIGHT_BROWSER_MATRIX: "1"
          RELEASE_GATE_USE_SYSTEM_EDGE: "0"
        run: npm run release:extended

      - name: Verify gate did not modify tracked files
        run: git diff --exit-code

      - name: Upload extended release report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-gate-extended-linux
          path: .release-gate/
          if-no-files-found: error
          include-hidden-files: true
