name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_extended:
        description: Run the extended release gate (requires DATABASE_URL and ADMIN_API_TOKEN secrets)
        required: false
        default: false
        type: boolean

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install workspace dependencies
        run: npm install

      - name: Sync backend dev dependencies
        working-directory: services/api
        run: uv sync --extra dev

      - name: Install Chromium for Playwright
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run default release gate
        run: npm run release:default

  release-gate-extended:
    if: github.event_name == 'workflow_dispatch' && inputs.run_extended
    needs: release-gate
    runs-on: ubuntu-latest
    env:
      RUN_REAL_DB_TESTS: "1"
      RUN_ADMIN_IMPORT_SMOKE: "1"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install workspace dependencies
        run: npm install

      - name: Sync backend dev dependencies
        working-directory: services/api
        run: uv sync --extra dev

      - name: Install Chromium for Playwright
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run extended release gate
        run: npm run release:extended
