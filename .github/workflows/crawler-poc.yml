name: Crawler PoC

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.7"

jobs:
  crawler-poc:
    name: Controlled crawler PoC (${{ matrix.platform }})
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'delivery:map-close'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out clean repository
        uses: actions/checkout@v7.0.0
        with:
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pinned uv
        run: python -m pip install uv==${{ env.UV_VERSION }}

      - name: Install locked PoC dependencies
        working-directory: services/api
        run: uv sync --frozen --extra dev --extra crawler-poc --python ${{ env.PYTHON_VERSION }}

      - name: Install Chromium and Linux runtime dependencies
        if: runner.os == 'Linux'
        working-directory: services/api
        run: uv run playwright install --with-deps chromium

      - name: Install Chromium on Windows
        if: runner.os == 'Windows'
        working-directory: services/api
        run: uv run playwright install chromium

      - name: Install Scrapling browser runtimes
        working-directory: services/api
        run: uv run scrapling install

      - name: Run acquisition tests
        working-directory: services/api
        run: uv run pytest -q tests/acquisition

      - name: Run acquisition lint
        working-directory: services/api
        run: uv run ruff check app/acquisition tests/acquisition scripts/run_crawler_poc.py scripts/run_source_adapter.py

      - name: Build offline Xi Lun source candidate
        working-directory: services/api
        run: uv run python scripts/run_source_adapter.py

      - name: Run strict controlled browser and anti-detection lab
        working-directory: services/api
        run: uv run python scripts/run_crawler_poc.py --require-browser-lab

      - name: Verify PoC did not modify tracked files
        run: git diff --exit-code

      - name: Upload crawler comparison report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: crawler-poc-${{ matrix.platform }}
          path: .release-gate/
          if-no-files-found: error
          include-hidden-files: true
