openapi: 3.1.0
info:
  title: Panda Atlas API
  version: 0.1.0-draft
  summary: Draft contract for Panda Atlas backend service
  description: |
    API draft for a panda encyclopedia and distribution map service.
    This contract is intended for FastAPI implementation and frontend integration.
servers:
  - url: https://panda-atlas-api.example.workers.dev
    description: Cloudflare Worker API
  - url: https://api.example.com
    description: Container API
  - url: http://localhost:8000
    description: Local FastAPI development
  - url: http://127.0.0.1:8787
    description: Local Cloudflare Worker development

tags:
  - name: health
  - name: pandas
  - name: map
  - name: stats
  - name: admin

paths:
  /health:
    get:
      tags: [health]
      summary: Service health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 0.1.0
                  db:
                    type: string
                    description: Database health state
                    enum: [ok, disabled, error, driver_missing]
                    example: ok

  /api/v1/pandas:
    get:
      tags: [pandas]
      summary: List pandas
      operationId: listPandas
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: q
          in: query
          schema:
            type: string
          description: Search keyword for names/tags
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PandaStatus'
        - name: gender
          in: query
          schema:
            type: string
            enum: [male, female, unknown]
        - name: habitat_id
          in: query
          description: Filter pandas linked to the given habitat through sightings or fallback habitat summaries
          schema:
            type: string
            format: uuid
        - name: featured
          in: query
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [name_asc, name_desc, birth_date_desc, created_at_desc]
            default: created_at_desc
      responses:
        '200':
          description: Paginated panda list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPandasResponse'

  /api/v1/pandas/{panda_ref}:
    get:
      tags: [pandas]
      summary: Get panda detail
      operationId: getPandaByRef
      parameters:
        - name: panda_ref
          in: path
          required: true
          description: Canonical panda slug or legacy UUID alias
          schema:
            type: string
            examples: [he-hua, 1d08f72f-7550-42e9-a4d5-bd74bc505955]
      responses:
        '200':
          description: Panda detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PandaDetail'
        '404':
          description: Panda not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/pandas/{panda_ref}/lineage:
    get:
      tags: [pandas]
      summary: Get panda lineage graph around a focus panda
      operationId: getPandaLineageByRef
      parameters:
        - name: panda_ref
          in: path
          required: true
          description: Canonical panda slug or legacy UUID alias
          schema:
            type: string
            examples: [he-hua, 1d08f72f-7550-42e9-a4d5-bd74bc505955]
        - name: ancestor_depth
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 16
            default: 6
        - name: descendant_depth
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 16
            default: 6
      responses:
        '200':
          description: Lineage graph centered on the target panda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PandaLineageResponse'
        '404':
          description: Panda not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/map/distribution:
    get:
      tags: [map]
      summary: Get distribution GeoJSON in a bounding box
      operationId: getDistribution
      parameters:
        - name: bbox
          in: query
          required: true
          description: minLon,minLat,maxLon,maxLat (EPSG:4326)
          schema:
            type: string
            example: '102.0,27.5,108.8,34.2'
        - name: snapshot_date
          in: query
          schema:
            type: string
            format: date
          description: Uses latest snapshot when omitted
        - name: layer
          in: query
          schema:
            $ref: '#/components/schemas/DistributionLayer'
        - name: zoom
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 22
      responses:
        '200':
          description: Distribution features
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionFeatureCollection'

  /api/v1/map/habitats:
    get:
      tags: [map]
      summary: Get habitat polygons
      operationId: getHabitats
      parameters:
        - name: bbox
          in: query
          schema:
            type: string
            example: '102.0,27.5,108.8,34.2'
        - name: level
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Habitat polygons in GeoJSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitatFeatureCollection'

  /api/v1/map/snapshots:
    get:
      tags: [map]
      summary: List available distribution snapshots
      operationId: listDistributionSnapshots
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 120
            default: 24
      responses:
        '200':
          description: Snapshot metadata list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionSnapshotList'

  /api/v1/stats/overview:
    get:
      tags: [stats]
      summary: Get dashboard overview metrics
      operationId: getOverviewStats
      responses:
        '200':
          description: Overview metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewStats'

  /api/v1/admin/import-sources:
    get:
      tags: [admin]
      summary: List approved import sources
      operationId: listImportSources
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Approved import sources for local operator workflows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSourceList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Admin token is still using the unsafe default outside development
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/import-jobs:
    post:
      tags: [admin]
      summary: Create an import job
      operationId: createImportJob
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportJobRequest'
      responses:
        '201':
          description: Import job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Import source is not approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Admin token is still using the unsafe default outside development
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/import-jobs/{job_id}:
    get:
      tags: [admin]
      summary: Get import job status
      operationId: getImportJob
      security:
        - BearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Import job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Admin token is still using the unsafe default outside development
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/import-jobs/{job_id}/run:
    post:
      tags: [admin]
      summary: Execute import job
      operationId: runImportJob
      security:
        - BearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Import job execution finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Job cannot be run from its current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Admin token is still using the unsafe default outside development
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/change-sets:
    post:
      tags: [admin-publication]
      summary: Create a draft change set with immutable entity revisions
      operationId: createChangeSet
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChangeSetRequest'
      responses:
        '201':
          description: Draft change set created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeSet'
        '401':
          description: Unauthorized
        '422':
          description: Invalid change set
        '503':
          description: Authoritative database unavailable

  /api/v1/admin/change-sets/{change_set_id}/submit:
    post:
      tags: [admin-publication]
      summary: Submit a draft change set for independent review
      operationId: submitChangeSet
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorId'
        - $ref: '#/components/parameters/ChangeSetId'
      responses:
        '200':
          description: Change set submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeSet'
        '404':
          description: Change set not found
        '409':
          description: Invalid state transition

  /api/v1/admin/change-sets/{change_set_id}/reviews:
    post:
      tags: [admin-publication]
      summary: Approve or reject a submitted change set
      operationId: reviewChangeSet
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorId'
        - $ref: '#/components/parameters/ChangeSetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewChangeSetRequest'
      responses:
        '200':
          description: Review recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeSet'
        '404':
          description: Change set not found
        '409':
          description: Self-review or invalid review transition denied

  /api/v1/admin/publication-batches:
    post:
      tags: [admin-publication]
      summary: Group approved change sets into a publication batch
      operationId: createPublicationBatch
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePublicationBatchRequest'
      responses:
        '201':
          description: Draft publication batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationBatch'
        '409':
          description: Batch contains a change set that is not approved

  /api/v1/admin/publication-batches/{batch_id}/preview:
    get:
      tags: [admin-publication]
      summary: Preview blocking publication integrity problems
      operationId: previewPublicationBatch
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorId'
        - $ref: '#/components/parameters/BatchId'
      responses:
        '200':
          description: Publication preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationPreview'
        '404':
          description: Publication batch not found

  /api/v1/admin/publication-batches/{batch_id}/publish:
    post:
      tags: [admin-publication]
      summary: Atomically publish a clean batch and switch the public version
      operationId: publishPublicationBatch
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorId'
        - $ref: '#/components/parameters/BatchId'
      responses:
        '200':
          description: Immutable published batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationBatch'
        '409':
          description: Batch is immutable or has blocking preview issues

  /api/v1/admin/publication-batches/{batch_id}/rollback:
    post:
      tags: [admin-publication]
      summary: Create an append-only release that rolls back to a published batch
      operationId: rollbackPublicationBatch
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorId'
        - $ref: '#/components/parameters/BatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationActionRequest'
      responses:
        '201':
          description: Rollback release published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationBatch'
        '409':
          description: Rollback target is not a published batch

  /api/v1/admin/publication-batches/{batch_id}/withdraw:
    post:
      tags: [admin-publication]
      summary: Create an append-only emergency withdrawal release
      operationId: withdrawPublicationBatch
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ActorId'
        - $ref: '#/components/parameters/BatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationActionRequest'
      responses:
        '201':
          description: Emergency withdrawal release published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationBatch'
        '409':
          description: Withdrawal target is not a published batch

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ActorId:
      name: X-Actor-Id
      in: header
      required: true
      description: Authenticated staff actor responsible for this workflow action
      schema:
        type: string
        format: uuid
    ChangeSetId:
      name: change_set_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BatchId:
      name: batch_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    PandaStatus:
      type: string
      enum: [alive, deceased, unknown]

    DistributionLayer:
      type: string
      enum: [wild, captive, protected_area, corridor]

    PaginationMeta:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
        total:
          type: integer
          example: 120

    PandaListItem:
      type: object
      required: [id, slug, name_zh, gender, status]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          example: he-hua
        name_zh:
          type: string
          example: He Hua
        name_en:
          type: string
          nullable: true
        gender:
          type: string
          enum: [male, female, unknown]
        status:
          $ref: '#/components/schemas/PandaStatus'
        birth_date:
          type: string
          format: date
          nullable: true
        current_location:
          type: string
          nullable: true
        cover_image_url:
          type: string
          format: uri
          nullable: true
        search_terms:
          type: array
          items:
            type: string


    IdentityNameRecord:
      type: object
      required: [value, language, kind, primary, source_ids]
      properties:
        value:
          type: string
        language:
          type: string
        kind:
          type: string
        primary:
          type: boolean
        source_ids:
          type: array
          items:
            type: string

    LegacySlugRecord:
      type: object
      required: [value, source_ids]
      properties:
        value:
          type: string
        source_ids:
          type: array
          items:
            type: string

    ExternalIdentifierRecord:
      type: object
      required: [system, value, source_ids]
      properties:
        system:
          type: string
        value:
          type: string
        source_ids:
          type: array
          items:
            type: string

    PandaIdentityProfile:
      type: object
      required: [stable_id, canonical_slug, names, aliases, legacy_slugs, external_identifiers]
      properties:
        stable_id:
          type: string
          format: uuid
        canonical_slug:
          type: string
        names:
          type: array
          items:
            $ref: '#/components/schemas/IdentityNameRecord'
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/IdentityNameRecord'
        legacy_slugs:
          type: array
          items:
            $ref: '#/components/schemas/LegacySlugRecord'
        external_identifiers:
          type: array
          items:
            $ref: '#/components/schemas/ExternalIdentifierRecord'

    PublicFactConclusion:
      type: object
      required: [field, value, status, last_verified_at, assertion_ids, source_ids, candidate_values, superseded_values]
      properties:
        field:
          type: string
        value:
          anyOf:
            - {}
            - type: 'null'
        status:
          type: string
          enum: [confirmed, provisional, disputed, superseded]
        last_verified_at:
          type: string
          format: date
        assertion_ids:
          type: array
          items:
            type: string
        source_ids:
          type: array
          items:
            type: string
        candidate_values:
          type: array
          items: {}
        superseded_values:
          type: array
          items: {}

    PublicSourceSummary:
      type: object
      required: [id, publisher, title, url, last_verified_at, language, access_state]
      properties:
        id:
          type: string
        publisher:
          type: string
        title:
          type: string
        url:
          type: string
        published_at:
          anyOf:
            - type: string
              format: date
            - type: 'null'
        last_verified_at:
          type: string
          format: date
        language:
          type: string
        access_state:
          type: string

    LocalizedPublicContent:
      type: object
      required: [locale, summary]
      properties:
        locale:
          type: string
        summary:
          type: string

    PublicMediaRelease:
      type: object
      required: [license_state, display_mode, source_ids]
      properties:
        license_state:
          type: string
          enum: [licensed, no_licensed_media, source_link_only]
        display_mode:
          type: string
          enum: [gallery, designed_empty_state, link_to_source]
        source_ids:
          type: array
          items:
            type: string

    PublicRevisionSummary:
      type: object
      required: [data_version, public_schema_version, summaries]
      properties:
        data_version:
          type: string
        public_schema_version:
          type: string
        summaries:
          type: array
          items:
            $ref: '#/components/schemas/LocalizedPublicContent'

    CurrentPlaceSummary:
      type: object
      required: [facility_id, coarse_location, status]
      properties:
        facility_id:
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
        coarse_location:
          type: [string, 'null']
        status:
          type: string
          enum: [confirmed, confirmed_country_level, provisional]

    PandaResidencySummary:
      allOf:
        - $ref: '#/components/schemas/CurrentPlaceSummary'
        - type: object
          required: [id, residency_type, start_date, start_precision, end_date, end_precision, source_ids]
          properties:
            id:
              type: string
            residency_type:
              type: string
              enum: [primary, temporary, transit, quarantine]
            start_date:
              type: string
              format: date
            start_precision:
              type: string
              enum: [day, month, year]
            end_date:
              anyOf:
                - type: string
                  format: date
                - type: 'null'
            end_precision:
              anyOf:
                - type: string
                  enum: [day, month, year]
                - type: 'null'
            source_ids:
              type: array
              items:
                type: string

    PandaDomainEventSummary:
      type: object
      required: [id, event_type, event_status, event_date, event_date_precision, participants, from_facility_id, from_coarse_location, to_facility_id, to_coarse_location, source_ids, changes_current_residency]
      properties:
        id:
          type: string
        event_type:
          type: string
          enum: [transfer]
        event_status:
          type: string
          enum: [announced, completed, cancelled, disputed]
        event_date:
          type: string
          format: date
        event_date_precision:
          type: string
          enum: [day, month, year]
        participants:
          type: array
          items:
            type: string
            format: uuid
        from_facility_id:
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
        from_coarse_location:
          type: [string, 'null']
        to_facility_id:
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
        to_coarse_location:
          type: [string, 'null']
        source_ids:
          type: array
          items:
            type: string
        changes_current_residency:
          type: boolean

    PandaDetail:
      allOf:
        - $ref: '#/components/schemas/PandaListItem'
        - type: object
          properties:
            intro:
              type: string
              nullable: true
            birthplace:
              type: string
              nullable: true
            tags:
              type: array
              items:
                type: string
            father_id:
              type: string
              format: uuid
              nullable: true
            mother_id:
              type: string
              format: uuid
              nullable: true
            habitats:
              type: array
              items:
                $ref: '#/components/schemas/HabitatSummary'
            media:
              type: array
              items:
                $ref: '#/components/schemas/MediaAsset'
            identity:
              anyOf:
                - $ref: '#/components/schemas/PandaIdentityProfile'
                - type: 'null'
            conclusions:
              type: array
              items:
                $ref: '#/components/schemas/PublicFactConclusion'
            sources:
              type: array
              items:
                $ref: '#/components/schemas/PublicSourceSummary'
            current_place:
              anyOf:
                - $ref: '#/components/schemas/CurrentPlaceSummary'
                - type: 'null'
            residencies:
              type: array
              items:
                $ref: '#/components/schemas/PandaResidencySummary'
            events:
              type: array
              items:
                $ref: '#/components/schemas/PandaDomainEventSummary'
            record_tier:
              type: string
              nullable: true
            localized_content:
              type: array
              items:
                $ref: '#/components/schemas/LocalizedPublicContent'
            media_release:
              anyOf:
                - $ref: '#/components/schemas/PublicMediaRelease'
                - type: 'null'
            public_revision:
              anyOf:
                - $ref: '#/components/schemas/PublicRevisionSummary'
                - type: 'null'

    PandaLineageNode:
      allOf:
        - $ref: '#/components/schemas/PandaListItem'
        - type: object
          properties:
            intro:
              type: string
              nullable: true
            tags:
              type: array
              items:
                type: string
            father_id:
              type: string
              format: uuid
              nullable: true
            mother_id:
              type: string
              format: uuid
              nullable: true

    PandaLineageEdge:
      type: object
      required: [parent_id, child_id]
      properties:
        parent_id:
          type: string
          format: uuid
        child_id:
          type: string
          format: uuid

    PandaLineageRelationship:
      type: object
      required: [subject_id, related_id, kind, path]
      properties:
        subject_id:
          type: string
          format: uuid
        related_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [parent, child, sibling, grandparent]
        path:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid

    PandaLineageMeta:
      type: object
      required: [ancestor_depth, descendant_depth]
      properties:
        ancestor_depth:
          type: integer
          minimum: 0
        descendant_depth:
          type: integer
          minimum: 0

    PandaLineageResponse:
      type: object
      required: [focus_id, nodes, edges, relationships, meta]
      properties:
        focus_id:
          type: string
          format: uuid
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/PandaLineageNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/PandaLineageEdge'
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/PandaLineageRelationship'
        meta:
          $ref: '#/components/schemas/PandaLineageMeta'

    HabitatSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        province:
          type: string
          nullable: true

    MediaAsset:
      type: object
      required: [id, storage_bucket, storage_path]
      properties:
        id:
          type: string
          format: uuid
        storage_bucket:
          type: string
        storage_path:
          type: string
        title:
          type: string
          nullable: true
        photographer:
          type: string
          nullable: true
        signed_url:
          type: string
          format: uri
          nullable: true

    PaginatedPandasResponse:
      type: object
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PandaListItem'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    GeoJsonGeometry:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point, MultiPolygon, Polygon, MultiPoint, LineString, MultiLineString]
        coordinates:
          description: Raw GeoJSON coordinates

    GeoJsonFeature:
      type: object
      required: [type, geometry, properties]
      properties:
        type:
          type: string
          const: Feature
        id:
          oneOf:
            - type: string
            - type: integer
        geometry:
          $ref: '#/components/schemas/GeoJsonGeometry'
        properties:
          type: object
          additionalProperties: true

    GeoJsonFeatureCollection:
      type: object
      required: [type, features]
      properties:
        type:
          type: string
          const: FeatureCollection
        features:
          type: array
          items:
            $ref: '#/components/schemas/GeoJsonFeature'

    FeatureCollectionMeta:
      type: object
      required: [truncated, limit, requested_zoom]
      properties:
        truncated:
          type: boolean
        limit:
          type: integer
          nullable: true
        requested_zoom:
          type: integer
          nullable: true

    DistributionFeatureProperties:
      type: object
      required: [layer, cell_code]
      properties:
        layer:
          $ref: '#/components/schemas/DistributionLayer'
        cell_code:
          type: string
        density:
          type: number
          nullable: true
        snapshot_date:
          type: string
          format: date
          nullable: true

    DistributionGeoJsonFeature:
      type: object
      required: [type, geometry, properties]
      properties:
        type:
          type: string
          const: Feature
        id:
          oneOf:
            - type: string
            - type: integer
        geometry:
          $ref: '#/components/schemas/GeoJsonGeometry'
        properties:
          $ref: '#/components/schemas/DistributionFeatureProperties'

    DistributionFeatureCollection:
      type: object
      required: [type, features, meta]
      properties:
        type:
          type: string
          const: FeatureCollection
        features:
          type: array
          items:
            $ref: '#/components/schemas/DistributionGeoJsonFeature'
        meta:
          $ref: '#/components/schemas/FeatureCollectionMeta'

    HabitatFeatureProperties:
      type: object
      required: [name]
      properties:
        name:
          type: string
        province:
          type: string
          nullable: true
        level:
          type: string
          nullable: true

    HabitatGeoJsonFeature:
      type: object
      required: [type, geometry, properties]
      properties:
        type:
          type: string
          const: Feature
        id:
          oneOf:
            - type: string
            - type: integer
        geometry:
          $ref: '#/components/schemas/GeoJsonGeometry'
        properties:
          $ref: '#/components/schemas/HabitatFeatureProperties'

    HabitatFeatureCollection:
      type: object
      required: [type, features, meta]
      properties:
        type:
          type: string
          const: FeatureCollection
        features:
          type: array
          items:
            $ref: '#/components/schemas/HabitatGeoJsonFeature'
        meta:
          $ref: '#/components/schemas/FeatureCollectionMeta'

    DistributionSnapshot:
      type: object
      required: [snapshot_date, version]
      properties:
        snapshot_date:
          type: string
          format: date
        version:
          type: string
        notes:
          type: string
          nullable: true

    DistributionSnapshotList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DistributionSnapshot'

    OverviewStats:
      type: object
      required: [total_pandas, active_habitats, latest_snapshot_date, wild_distribution_cells, featured_pandas]
      properties:
        total_pandas:
          type: integer
          example: 612
        active_habitats:
          type: integer
          example: 67
        latest_snapshot_date:
          type: string
          format: date
        wild_distribution_cells:
          type: integer
          example: 1430
        featured_pandas:
          type: integer
          example: 12

    ImportSourceOption:
      type: object
      required: [name, label, source_path]
      properties:
        name:
          type: string
          example: 0001_demo_seed.sql
        label:
          type: string
          example: Demo seed dataset
        source_path:
          type: string
          example: infra/supabase/seed/0001_demo_seed.sql

    ImportSourceList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ImportSourceOption'

    CreateImportJobRequest:
      type: object
      required: [source_name]
      properties:
        source_name:
          type: string
          example: 0001_demo_seed.sql

    ImportJobSummary:
      type: object
      required: [rows_total, rows_success, rows_failed, source_name, source_path, mode]
      properties:
        rows_total:
          type: integer
          example: 1
        rows_success:
          type: integer
          example: 1
        rows_failed:
          type: integer
          example: 0
        source_name:
          type: string
          example: 0001_demo_seed.sql
        source_path:
          type: string
          example: infra/supabase/seed/0001_demo_seed.sql
        mode:
          type: string
          example: mock
        failure_reason:
          type: string
          nullable: true

    ImportJob:
      type: object
      required: [id, source_name, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        source_name:
          type: string
        source_uri:
          type: string
          nullable: true
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        summary:
          $ref: '#/components/schemas/ImportJobSummary'
        error_log:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    EntityRevisionInput:
      type: object
      required: [entity_type, entity_id, payload]
      properties:
        entity_type:
          type: string
          enum: [panda]
        entity_id:
          type: string
        payload:
          $ref: '#/components/schemas/EntityRevisionPayload'

    EntityRevisionPayload:
      type: object
      required: [public_record, publication_checks]
      properties:
        public_record:
          type: object
          minProperties: 1
          additionalProperties: false
          properties:
            name_zh:
              type: string
            name_en:
              type: string
              nullable: true
            gender:
              type: string
              enum: [male, female, unknown]
            birth_date:
              type: string
              format: date
              nullable: true
            death_date:
              type: string
              format: date
              nullable: true
            status:
              type: string
              enum: [alive, deceased, unknown]
            birthplace:
              type: string
              nullable: true
            current_location:
              type: string
              nullable: true
            intro:
              type: string
              nullable: true
            tags:
              type: array
              items:
                type: string
            is_featured:
              type: boolean
        publication_checks:
          $ref: '#/components/schemas/PublicationChecks'

    PublicationChecks:
      type: object
      required: [references, residencies, translations, sources, media]
      properties:
        references:
          type: array
          items:
            type: object
            required: [target_type, target_id, resolved]
            properties:
              target_type:
                type: string
              target_id:
                type: string
              resolved:
                type: boolean
        residencies:
          type: array
          items:
            type: object
            required: [panda_id, start_date]
            properties:
              panda_id:
                type: string
              start_date:
                type: string
                format: date
              end_date:
                type: string
                format: date
                nullable: true
        translations:
          type: array
          items:
            type: object
            required: [language_tag, status]
            properties:
              language_tag:
                type: string
              status:
                type: string
        sources:
          type: array
          items:
            type: object
            required: [id, access_state]
            properties:
              id:
                type: string
              access_state:
                type: string
        media:
          type: array
          items:
            type: object
            required: [id, license]
            properties:
              id:
                type: string
              license:
                type: string
                nullable: true

    EntityRevision:
      allOf:
        - $ref: '#/components/schemas/EntityRevisionInput'
        - type: object
          required: [id, revision_number, created_by, substantive_modified_by]
          properties:
            id:
              type: string
              format: uuid
            revision_number:
              type: integer
              minimum: 1
            created_by:
              type: string
              format: uuid
            substantive_modified_by:
              type: string
              format: uuid

    CreateChangeSetRequest:
      type: object
      required: [title, reason, revisions]
      properties:
        title:
          type: string
        reason:
          type: string
        revisions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/EntityRevisionInput'

    ChangeSet:
      type: object
      required: [id, title, reason, status, created_by, revisions]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        reason:
          type: string
        status:
          type: string
          enum: [draft, submitted, approved, rejected]
        created_by:
          type: string
          format: uuid
        reviewed_by:
          type: string
          format: uuid
          nullable: true
        review_reason:
          type: string
          nullable: true
        revisions:
          type: array
          items:
            $ref: '#/components/schemas/EntityRevision'

    ReviewChangeSetRequest:
      type: object
      required: [decision, reason]
      properties:
        decision:
          type: string
          enum: [approved, rejected]
        reason:
          type: string

    CreatePublicationBatchRequest:
      type: object
      required:
        [change_set_ids, public_schema_version, data_version, reason, correlation_id]
      properties:
        change_set_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        public_schema_version:
          type: string
          enum: [1.0.0]
        data_version:
          type: string
        reason:
          type: string
        correlation_id:
          type: string
          format: uuid

    PublicationIssue:
      type: object
      required: [category, entity_type, entity_id, detail]
      properties:
        category:
          type: string
          enum:
            - unresolved_reference
            - residency_conflict
            - translation_state
            - source_availability
            - license_problem
        entity_type:
          type: string
        entity_id:
          type: string
        detail:
          type: string

    PublicationPreview:
      type: object
      required: [is_publishable, issues]
      properties:
        is_publishable:
          type: boolean
        issues:
          type: array
          items:
            $ref: '#/components/schemas/PublicationIssue'

    PublicationBatch:
      type: object
      required:
        - id
        - change_set_ids
        - public_schema_version
        - data_version
        - reason
        - correlation_id
        - operation
        - status
        - created_by
      properties:
        id:
          type: string
          format: uuid
        change_set_ids:
          type: array
          items:
            type: string
            format: uuid
        public_schema_version:
          type: string
        data_version:
          type: string
        reason:
          type: string
        correlation_id:
          type: string
          format: uuid
        operation:
          type: string
          enum: [release, rollback, withdrawal]
        status:
          type: string
          enum: [draft, published]
        created_by:
          type: string
          format: uuid
        published_by:
          type: string
          format: uuid
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        previous_batch_id:
          type: string
          format: uuid
          nullable: true
        rollback_target_id:
          type: string
          format: uuid
          nullable: true
        withdrawal_target_id:
          type: string
          format: uuid
          nullable: true

    PublicationActionRequest:
      type: object
      required: [reason, correlation_id, data_version]
      properties:
        reason:
          type: string
        correlation_id:
          type: string
          format: uuid
        data_version:
          type: string

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: not_found
        message:
          type: string
          example: Panda not found

