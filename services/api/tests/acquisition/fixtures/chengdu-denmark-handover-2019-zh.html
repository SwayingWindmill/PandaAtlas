      <h1>成都大熊猫“星二”“毛二”赴丹欢送仪式 在成都大熊猫繁育研究基地隆重举行</h1>
      <p>两只大熊猫将于4月4日7点30分从成都启程前往丹麦，并入住丹麦哥本哈根动物园。</p>
      <h2>成都大熊猫繁育研究基地赴丹大熊猫简介：</h2>
      <p>大熊猫星二：谱系号900，雄性。出生于2013年8月23日，父亲是大熊猫“勇勇”，母亲是大熊猫“星蓉”。性格活泼，爱爬树，爱泡澡。</p>
      <p>大熊猫毛二：谱系号919，乳名毛笋，雌性。出生于2014年7月26日，父亲是大熊猫“雄浜”，母亲是大熊猫“福娃”。性格文静，不爱动，爱独处。</p>
